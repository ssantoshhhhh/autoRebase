version: "3.8"

services:
  # ── Database (pgvector-enabled) ──────────────────────────────────────────────
  # Uses pgvector/pgvector image so the vector extension is available locally.
  # Run `npm run prisma:migrate` against this to create all tables including
  # persons_of_interest and detected_faces — no Supabase SQL Editor needed.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reva_postgres
    environment:
      POSTGRES_DB: reva_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reva_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Face Recognition Microservice ────────────────────────────────────────────
  # InsightFace buffalo_l model. Downloads ~500MB on first run.
  # Exposes POST /detect and GET /health on port 8001.
  face_service:
    build:
      context: ./face_service
      dockerfile: Dockerfile
    container_name: reva_face_service
    environment:
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET:-internal-service-secret}
    ports:
      - "8001:8001"
    volumes:
      - insightface_models:/root/.insightface  # cache model weights across restarts

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reva_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/reva_ai_db
      DIRECT_URL: postgresql://postgres:password@postgres:5432/reva_ai_db
      REDIS_HOST: redis
      FACE_SERVICE_URL: http://face_service:8001
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      face_service:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Citizen-facing frontend (port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reva_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend


  nginx:
    image: nginx:alpine
    container_name: reva_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  insightface_models:  # persistent volume so model isn't re-downloaded on every restart

